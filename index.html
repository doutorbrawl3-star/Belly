<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Isabelly</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent: #fbbf24; /* Dourado minimalista */
            --accent-glow: rgba(251, 191, 36, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Fundo com Partículas Sutis */
        .background-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Container do Cartão */
        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 500px;
            padding: 2px;
            border-radius: 24px;
        }

        /* Glassmorphism Premium */
        .card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 45px 35px;
            text-align: center;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 25px;
            background: linear-gradient(to right, #ffffff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Texto Autoral e Sincero */
        .letter-text {
            font-size: 1.15rem;
            color: var(--text-secondary);
            line-height: 1.8;
            text-align: left;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .letter-text p {
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .letter-text p.show {
            opacity: 1;
            transform: translateY(0);
        }

        .highlight {
            color: var(--accent);
            font-weight: 500;
        }

        /* Botões */
        .btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .btn:hover {
            background: #ffffff;
            color: #0f172a;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-accent {
            background: var(--accent);
            color: #0f172a;
            border: none;
            font-weight: 600;
        }

        .btn-accent:hover {
            background: #fcd34d;
            box-shadow: 0 0 25px var(--accent-glow);
        }

        /* Ajuste Mobile */
        @media (max-width: 480px) {
            .card {
                padding: 35px 22px;
            }
            h1 {
                font-size: 2.1rem;
            }
            .letter-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <canvas class="background-canvas" id="particles"></canvas>

    <div class="container">
        <div class="card" id="mainCard">
            
            <!-- Entrada -->
            <div class="screen active" id="screen1">
                <h1>Oi, Isabelly ✨</h1>
                <div style="height: 25px;"></div>
                <button class="btn btn-accent" onclick="nextScreen()">Abrir</button>
            </div>

            <!-- Declaração Direta e Sincera -->
            <div class="screen" id="screen2">
                <div class="letter-text" id="letterContent">
                    <p>Queria muito te dizer que você é <span class="highlight">linda</span> e que eu gosto de verdade de você.</p>
                    <p>Você é uma pessoa incrivelmente legal, muito inteligente e eu admiro demais o quanto você é boa no vôlei.</p>
                    <p>Conversar com você tem o poder de melhorar o meu dia, e eu admiro muito cada detalhe do seu jeitinho.</p>
                </div>
                <button class="btn" onclick="resetScreen()">Voltar</button>
            </div>

        </div>
    </div>

    <script>
        // Aparição do cartão inicial
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('mainCard').classList.add('visible');
            }, 300);
        });

        // Transição de telas
        function nextScreen() {
            const s1 = document.getElementById('screen1');
            const s2 = document.getElementById('screen2');
            
            s1.style.opacity = '0';
            s1.style.transition = 'opacity 0.4s ease';
            
            setTimeout(() => {
                s1.classList.remove('active');
                s2.classList.add('active');
                animateLetter();
            }, 400);
        }

        function resetScreen() {
            const s1 = document.getElementById('screen1');
            const s2 = document.getElementById('screen2');
            const paragraphs = document.querySelectorAll('.letter-text p');
            
            paragraphs.forEach(p => p.classList.remove('show'));
            s2.classList.remove('active');
            s1.classList.add('active');
            s1.style.opacity = '1';
        }

        // Animação de surgimento das frases
        function animateLetter() {
            const paragraphs = document.querySelectorAll('.letter-text p');
            paragraphs.forEach((p, index) => {
                setTimeout(() => {
                    p.classList.add('show');
                }, index * 500); 
            });
        }

        // Partículas sutis no plano de fundo
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const numberOfParticles = 35;

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.2 - 0.1;
                this.speedY = Math.random() * 0.2 - 0.1;
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();
    </script>
</body>
</html>
