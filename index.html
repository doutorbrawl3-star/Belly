<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Isabelly</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #060913 0%, #0f0e21 50%, #150820 100%);
            --glass-bg: #0d111c;
            --glass-blur: blur(20px);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent: #fbbf24; 
            --accent-glow: rgba(251, 191, 36, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
        }

        .background-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .tilt-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 480px;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .card-glow-wrapper {
            position: relative;
            border-radius: 24px;
            padding: 1.5px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            transform-style: preserve-3d;
            transition: transform 0.15s ease-out;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .card-glow-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 30%, var(--accent) 50%, transparent 70%);
            animation: rotateGlow 6s linear infinite;
            z-index: 0;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 23px;
            padding: 50px 40px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.1, 0.8, 0.2, 1);
            position: relative;
            z-index: 1;
            transform-style: preserve-3d;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card-glare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 2;
            transform: translateZ(1px);
        }

        .screen {
            display: none;
            transform: translateZ(50px) scale(0.95);
            position: relative;
            z-index: 3;
        }

        .screen.active {
            display: block;
        }

        /* Título Principal com Gradiente Animado (Efeito Apple) */
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 35px;
            background: linear-gradient(
                to right, 
                #ffffff 0%, 
                #fcd34d 25%, 
                #ffffff 50%, 
                #fcd34d 75%, 
                #ffffff 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 4s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .letter-text {
            font-size: 1.15rem;
            color: var(--text-secondary);
            line-height: 1.8;
            text-align: left;
            margin-bottom: 35px;
            font-weight: 300;
            min-height: 250px;
        }

        .letter-text p {
            margin-bottom: 24px;
        }

        .highlight {
            color: var(--accent);
            font-weight: 500;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: var(--accent);
            margin-left: 2px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .magnetic-wrap {
            display: inline-block;
            position: relative;
            padding: 15px;
            transform: translateZ(30px);
        }

        .btn {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 14px 40px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            position: relative;
            transition: background 0.3s, border 0.3s, box-shadow 0.3s, opacity 0.3s;
            will-change: transform;
        }

        .btn:hover {
            background: #ffffff;
            color: #090d16;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.25);
        }

        .btn-accent {
            background: var(--accent);
            color: #090d16;
            border: none;
            font-weight: 600;
        }

        .btn-accent:hover {
            background: #fcd34d;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        #backBtn {
            opacity: 0;
            transition: opacity 0.5s ease;
            transform: translateZ(20px);
        }

        #backBtn.show {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .card { padding: 45px 24px; }
            h1 { font-size: 2.1rem; }
            .letter-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <canvas class="background-canvas" id="particles"></canvas>

    <div class="tilt-container" id="tiltContainer">
        <div class="card-glow-wrapper" id="glowWrapper">
            <div class="card" id="mainCard">
                <div class="card-glare" id="cardGlare"></div>
                
                <div class="screen active" id="screen1">
                    <h1>Oi, Isabelly ✨</h1>
                    <div class="magnetic-wrap" id="magneticArea">
                        <button class="btn btn-accent" id="magneticBtn" onclick="triggerOpen(event)">Abrir</button>
                    </div>
                </div>

                <div class="screen" id="screen2">
                    <div class="letter-text" id="typewriterTarget"></div>
                    <button class="btn" id="backBtn" onclick="resetScreen()">Voltar</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('tiltContainer');
        const wrapper = document.getElementById('glowWrapper');
        const card = document.getElementById('mainCard');
        const glare = document.getElementById('cardGlare');
        const magneticArea = document.getElementById('magneticArea');
        const magneticBtn = document.getElementById('magneticBtn');
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        let burstParticles = [];
        let typewriterTimeout;

        const mouse = { x: null, y: null, radius: 100 };

        const textParagraphs = [
            'Você é muito <span class="highlight">legal</span> e eu gosto de você',
            'Você é muito inteligente e eu admiro demais o quanto você é boa no vôlei.',
            'Conversar com você tem o poder de melhorar o meu dia, e eu admiro muito cada detalhe do seu jeitinho.'
        ];

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { card.classList.add('visible'); }, 300);
        });

        // Efeito 3D (Tilt Parallax) + Rastreamento do Mouse/Touch para o fundo
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            const rect = container.getBoundingClientRect();
            const cardCenterX = rect.left + rect.width / 2;
            const cardCenterY = rect.top + rect.height / 2;
            
            const angleX = -(e.clientY - cardCenterY) / 12; 
            const angleY = (e.clientX - cardCenterX) / 12;
            
            const cappedX = Math.min(Math.max(angleX, -15), 15);
            const cappedY = Math.min(Math.max(angleY, -15), 15);
            
            wrapper.style.transform = `rotateX(${cappedX}deg) rotateY(${cappedY}deg)`;
            glare.style.transform = `translateZ(1px) translateX(${-cappedY * 1.5}px) translateY(${cappedX * 1.5}px)`;
        });

        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        });

        document.addEventListener('mouseleave', () => {
            wrapper.style.transform = `rotateX(0deg) rotateY(0deg)`;
            glare.style.transform = `translateZ(1px) translateX(0px) translateY(0px)`;
            mouse.x = null;
            mouse.y = null;
        });

        document.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Giroscópio (Celular)
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                if (window.innerWidth <= 768) {
                    const tiltX = Math.min(Math.max(e.beta - 45, -15), 15);
                    const tiltY = Math.min(Math.max(e.gamma, -15), 15);
                    wrapper.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
                }
            });
        }

        // Botão Magnético
        if (window.innerWidth > 768) {
            magneticArea.addEventListener('mousemove', (e) => {
                const rect = magneticBtn.getBoundingClientRect();
                const btnX = rect.left + rect.width / 2;
                const btnY = rect.top + rect.height / 2;
                const distX = e.clientX - btnX;
                const distY = e.clientY - btnY;
                magneticBtn.style.transform = `translate(${distX * 0.35}px, ${distY * 0.35}px) scale(1.02)`;
            });

            magneticArea.addEventListener('mouseleave', () => {
                magneticBtn.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                magneticBtn.style.transform = 'translate(0px, 0px) scale(1)';
            });
        }

        function triggerOpen(event) {
            createBurst(event.clientX, event.clientY);
            nextScreen();
        }

        function nextScreen() {
            const s1 = document.getElementById('screen1');
            const s2 = document.getElementById('screen2');
            
            s1.style.opacity = '0';
            s1.style.transition = 'opacity 0.4s ease';
            
            setTimeout(() => {
                s1.classList.remove('active');
                s2.classList.add('active');
                startTypewriter();
            }, 400);
        }

        function resetScreen() {
            clearTimeout(typewriterTimeout);
            document.getElementById('backBtn').classList.remove('show');
            const s1 = document.getElementById('screen1');
            const s2 = document.getElementById('screen2');
            s2.classList.remove('active');
            s1.classList.add('active');
            s1.style.opacity = '1';
        }

        // Sistema de Escrita Inteligente
        function startTypewriter() {
            const target = document.getElementById('typewriterTarget');
            target.innerHTML = '';
            let currentParagraph = 0;
            let currentChar = 0;
            
            function type() {
                if (currentParagraph < textParagraphs.length) {
                    if (currentChar === 0) {
                        const p = document.createElement('p');
                        p.id = `text-p-${currentParagraph}`;
                        target.appendChild(p);
                    }
                    
                    const p = document.getElementById(`text-p-${currentParagraph}`);
                    const fullText = textParagraphs[currentParagraph];
                    
                    if (fullText.substr(currentChar, 1) === '<') {
                        let tagLength = fullText.substr(currentChar).indexOf('>') + 1;
                        currentChar += tagLength;
                    } else {
                        currentChar++;
                    }
                    
                    p.innerHTML = fullText.substr(0, currentChar) + '<span class="cursor"></span>';
                    
                    if (currentChar >= fullText.length) {
                        p.innerHTML = fullText;
                        currentParagraph++;
                        currentChar = 0;
                        typewriterTimeout = setTimeout(type, 350);
                    } else {
                        typewriterTimeout = setTimeout(type, 25);
                    }
                } else {
                    document.getElementById('backBtn').classList.add('show');
                }
            }
            type();
        }

        // Confetes Físicos de Luz
        class BurstParticle {
            constructor(x, y) {
                this.x = x || window.innerWidth / 2;
                this.y = y || window.innerHeight / 2;
                this.size = Math.random() * 3 + 1.5;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.speedX = Math.cos(angle) * speed;
                this.speedY = Math.sin(angle) * speed;
                this.opacity = 1;
                this.decay = Math.random() * 0.03 + 0.015;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedX *= 0.94;
                this.speedY *= 0.94;
                this.opacity -= this.decay;
            }
            draw() {
                ctx.fillStyle = `rgba(251, 191, 36, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createBurst(clientX, clientY) {
            const x = clientX || window.innerWidth / 2;
            const y = clientY || window.innerHeight / 2;
            for (let i = 0; i < 35; i++) {
                burstParticles.push(new BurstParticle(x, y));
            }
        }

        // Fundo Estelar Ambiência (REATIVO AO TOQUE/MOUSE)
        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        class AmbientParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = Math.random() * 1.2 + 0.4;
                this.speedX = Math.random() * 0.12 - 0.06;
                this.speedY = Math.random() * 0.12 - 0.06;
                this.opacity = Math.random() * 0.3 + 0.1;
                this.density = (Math.random() * 20) + 5;
            }
            update() {
                this.baseX += this.speedX;
                this.baseY += this.speedY;
                
                if (this.baseX > canvas.width) this.baseX = 0;
                if (this.baseX < 0) this.baseX = canvas.width;
                if (this.baseY > canvas.height) this.baseY = 0;
                if (this.baseY < 0) this.baseY = canvas.height;

                this.x = this.baseX;
                this.y = this.baseY;

                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < mouse.radius) {
                        let forceDirectionX = dx / distance;
                        let forceDirectionY = dy / distance;
                        let maxDistance = mouse.radius;
                        let force = (maxDistance - distance) / maxDistance;
                        let directionX = forceDirectionX * force * this.density;
                        let directionY = forceDirectionY * force * this.density;
                        
                        this.x -= directionX;
                        this.y -= directionY;
                    }
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 40; i++) { particlesArray.push(new AmbientParticle()); }

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => { p.update(); p.draw(); });
            
            for (let i = burstParticles.length - 1; i >= 0; i--) {
                burstParticles[i].update();
                burstParticles[i].draw();
                if (burstParticles[i].opacity <= 0) {
                    burstParticles.splice(i, 1);
                }
            }
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();
    </script>
</body>
</html>
