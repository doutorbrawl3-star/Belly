<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Isabelly 💙</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffd6e7,#d9ecff);
overflow:hidden;
}


.card{

width:330px;

background:rgba(255,255,255,.75);

backdrop-filter:blur(10px);

padding:30px;

border-radius:25px;

text-align:center;

box-shadow:0 15px 35px rgba(0,0,0,.15);

animation:entrar 1s;

}


@keyframes entrar{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}


h1{

color:#4d7cff;

}


p{

color:#555;

line-height:1.5;

}


button{

border:0;

padding:13px 25px;

border-radius:20px;

background:#4d7cff;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}


button:hover{

transform:scale(1.08);

}


#msg{

display:none;

margin-top:20px;

}



.heart{

position:absolute;

animation:cair 5s linear infinite;

}


@keyframes cair{

from{

transform:translateY(-10vh);

}

to{

transform:translateY(110vh);

}

}


</style>

</head>


<body>


<div class="card">

<h1>Oi, Isabelly 😊</h1>


<p>
Fiz uma coisinha aqui que queria te mostrar.
</p>


<button onclick="abrir()">

Abrir 💙

</button>


<div id="msg">

<p>

Eu queria te falar que admiro muito você.<br><br>

Você é uma pessoa muito legal, inteligente e gosto muito do seu jeito.<br><br>

Gosto de conversar com você, porque melhora meu dia 😊<br><br>

Também acho muito legal sua dedicação no vôlei.

</p>


<h2>💙</h2>


</div>


</div>



<script>


function abrir(){


document.getElementById("msg").style.display="block";


for(let i=0;i<15;i++){


let h=document.createElement("div");


h.className="heart";


h.innerHTML="💙";


h.style.left=Math.random()*100+"vw";


h.style.animationDelay=Math.random()*2+"s";


document.body.appendChild(h);



setTimeout(()=>{

h.remove();

},5000);


}


}


</script>


</body>

</html>
